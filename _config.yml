title: Free eVTOL Corpus
description: A public-domain prior art commons for eVTOL and eVTOL-adjacent aircraft. CC0.
url: https://openie-dev.github.io
baseurl: /free-evtol-corpus

remote_theme: just-the-docs/just-the-docs

color_scheme: dark

search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 4
  preview_words_after: 8
  tokenizer_separator: /[\s\-/_]+/
  rel_url: true
  button: false

heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/openIE-dev/free-evtol-corpus"
aux_links_new_tab: true

footer_content: |
  Public domain (CC0 1.0). The corpus IS the prior art commons.

last_edit_timestamp: false

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue

defaults:
  - scope:
      path: "cross_cuts"
      type: "pages"
    values:
      layout: default
      parent: "Cross-cuts"
  - scope:
      path: "contention_packets"
      type: "pages"
    values:
      layout: default
      parent: "Invalidity Contentions"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - node_modules/
  - tools/
  - releases/
  - notes-claude/
  - corpus.jsonl
  - private.jsonl
  - open.jsonl
  - fictional.jsonl
  - academic.jsonl
  - lineage.json
  - release.sh
  - "*.gemspec"
  - "*.tar.gz"
  - "*.tsr"
  - "*.tsq"
  - "*.ots"
  - SHA256SUMS

include:
  - data
